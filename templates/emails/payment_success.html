<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            background: #ffffff;
            padding: 25px;
            margin: auto;
            border-radius: 12px;
            text-align: center;
        }

        .logo {
            width: 130px;
            margin-bottom: 15px;
        }

        h2 {
            color: #28a745;
        }

        .details {
            text-align: left;
            margin-top: 20px;
            font-size: 14px;
        }

        .details p {
            margin: 5px 0;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }

        .footer {
            font-size: 12px;
            color: gray;
            margin-top: 25px;
        }
    </style>
</head>

<body>
    <div class="container">

        <img src="{{ logo_url }}" class="logo" />

        <h2>🎉 Payment Successful, {{ name }}!</h2>

        <p>You are successfully enrolled in <b>{{ course }}</b></p>

        <div class="details">
            <p><b>Student ID:</b> {{ student_id }}</p>
            <p><b>Payment ID:</b> {{ payment_id }}</p>
            <p><b>Order ID:</b> {{ order_id }}</p>
            <p><b>Amount Paid:</b> ₹{{ amount }}</p>
            <p><b>Date:</b> {{ date }}</p>
        </div>

        <a href="https://www.gogaledu.com/terms-conditions" class="btn">Terms & Conditions</a>

        <br>

        <a href="{{ website_url }}" class="btn" style="background:#28a745;">
            Visit Dashboard
        </a>

        <div class="footer">
            📍 {{ address }} <br>
            📞 {{ phone }}
        </div>

    </div>
</body>

</html>
